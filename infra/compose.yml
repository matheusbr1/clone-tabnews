name: clone-tabnews

services:
  database:
    container_name: clone_tabnews_db
    image: postgres:16.0-alpine3.18

    env_file:
      - ../.env.development

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: clone_tabnews_volume
